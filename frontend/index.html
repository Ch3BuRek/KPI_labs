<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MYSITE</title>
<link rel="stylesheet" href="styles/styles.css"/>
</head>
<body>

<header class="header">
    <div class="header-logo">logo</div>
    <button id="cart-btn" class="cart-btn">
        Cart (<span id="cart-count">0</span>)
    </button>
</header>

<main class="page"> 
    <section class="section">
        <div class="section-header">
            <h2>Menu</h2>
            <div class="cat-tabs" id="cat-tabs"></div>
        </div>
        <div class="menu-grid" id="menu-grid">menu here</div>
    </section>

    <aside class="cart-panel" id="cart-panel">
        <h3>Your order</h3>

        <div class="field-group">
            <label for="address-input">Delivery address</label>
            <input id="address-input" type="text" placeholder="123 Lukianivka St" value="123 Lukianivka St"/>
        </div>

        <div id="cart-items" class="cart-items">
            <p class="empty">No items added yet...</p>
        </div>

        <div id="cart-totals" class="cart-totals hidden"></div>

        <button id="place-order-btn" class="btn-primary" disabled>Place order</button>
    </aside>
</main>

<script type="module" src="script/index.js"></script>
</body>
</html>
